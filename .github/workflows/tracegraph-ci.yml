# setup the CI action
name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── JavaScript / TypeScript tests ─────────────────────────────────────────
  test-js:
    name: Test (JS/TS)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Run tests
        run: pnpm test

  # ── PHP / Laravel tests ───────────────────────────────────────────────────
  test-php:
    name: Test (PHP/Laravel)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: packages/trace-laravel

    strategy:
      matrix:
        php: ["8.1", "8.2", "8.3", "8.4"]
        laravel: ["10.*", "11.*"]
        exclude:
          # Laravel 11 requires PHP 8.2+
          - php: "8.1"
            laravel: "11.*"

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo, pdo_sqlite, sqlite3
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: packages/trace-laravel/vendor
          key: php-${{ matrix.php }}-laravel-${{ matrix.laravel }}-${{ hashFiles('packages/trace-laravel/composer.json') }}
          restore-keys: |
            php-${{ matrix.php }}-laravel-${{ matrix.laravel }}-

      - name: Install Composer dependencies
        run: |
          composer require "illuminate/contracts:${{ matrix.laravel }}" \
                           "illuminate/http:${{ matrix.laravel }}" \
                           "illuminate/support:${{ matrix.laravel }}" \
                           --no-interaction --no-update
          composer update --prefer-stable --prefer-dist --no-interaction --no-progress

      - name: Run PHPUnit tests
        run: vendor/bin/phpunit --testdox

  # ── PHP sample project tests ──────────────────────────────────────────────
  test-php-sample:
    name: Test (laravel-api sample)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test-php   # only run after the package tests pass

    defaults:
      run:
        working-directory: sample-projects/laravel-api

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, pdo, pdo_sqlite, sqlite3
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: sample-projects/laravel-api/vendor
          key: php-8.2-laravel-api-${{ hashFiles('sample-projects/laravel-api/composer.json') }}

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run PHPUnit tests
        run: vendor/bin/phpunit --testdox
